<style>
:root {
  --bg: #0d1117;
  --surface: #161b22;
  --surface2: #1c2330;
  --border: #30363d;
  --accent: #f0b429;
  --accent2: #58a6ff;
  --success: #3fb950;
  --danger: #f85149;
  --text: #e6edf3;
  --muted: #8b949e;
  --mono: 'IBM Plex Mono', monospace;
  --sans: 'IBM Plex Sans', sans-serif;
}
* { touch-action: pan-x pan-y; }
html { touch-action: manipulation; }
body { font-family: var(--sans); background: var(--bg); color: var(--text); min-height: 100vh; }

/* HEADER */
/* HEADER TOP — logo + pages */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 16px;
  padding-top: env(safe-area-inset-top);
  height: calc(44px + env(safe-area-inset-top));
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 200;
}
/* FOOTER TOOLBAR — outils */
.footer-tools {
  background: var(--surface2);
  border-top: 1px solid var(--border);
  height: calc(44px + env(safe-area-inset-bottom));
  display: flex;
  align-items: center;
  padding-top: 0;
  padding-bottom: env(safe-area-inset-bottom);
  gap: 8px;
  padding-left: max(14px, env(safe-area-inset-left));
  padding-right: max(14px, env(safe-area-inset-right));
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  z-index: 200;
}
.logo { font-family: var(--mono); font-weight: 700; font-size: 20px; color: var(--accent); letter-spacing: 4px; }
.logo-sep { color: var(--muted); font-weight: 300; font-family: var(--mono); font-size: 18px; margin: 0 6px; }
.page-tabs { display: flex; gap: 4px; }
.page-tab { background: none; border: 1px solid var(--border); border-radius: 6px; color: var(--muted); font-family: var(--mono); font-size: 11px; font-weight: 600; padding: 4px 8px; cursor: pointer; transition: all .15s; letter-spacing: 1px; }
.page-tab:hover { color: var(--text); border-color: var(--text); }
.page-tab.active { background: var(--accent); border-color: var(--accent); color: #000; }
.search-wrap { flex: 1; max-width: 340px; position: relative; }
.search-wrap input {
  width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
  padding: 6px 10px 6px 30px; color: var(--text); font-family: var(--sans); font-size: 13px; outline: none; transition: border-color .2s;
}
.search-wrap input:focus { border-color: var(--accent2); }
.search-wrap input::placeholder { color: var(--muted); }
.search-icon { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 13px; pointer-events:none; }
.header-right { margin-left: auto; display: flex; gap: 6px; }
.btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: var(--sans); font-size: 12px; padding: 6px 12px; cursor: pointer; transition: all .15s; white-space: nowrap; }
.btn:hover { background: var(--border); }
.btn.active { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 600; }
.btn.danger { color: var(--danger); }
.btn.danger:hover { border-color: var(--danger); background: rgba(248,81,73,.1); }
.menu-toggle { background: none; border: none; color: var(--text); font-size: 20px; cursor: pointer; padding: 4px; display: block; }

/* OVERLAY — visible sur tous les écrans */
.overlay { display: none; position: fixed; inset: calc(44px + env(safe-area-inset-top)) 0 0 0; background: rgba(0,0,0,.5); z-index: 140; }
.overlay.vis { display: block; }

/* LAYOUT */
.layout { display: block; height: calc(100vh - 44px - 44px - env(safe-area-inset-top) - env(safe-area-inset-bottom)); margin-top: calc(44px + env(safe-area-inset-top)); }

/* SIDEBAR — toujours en overlay, jamais dans le layout */
aside {
  width: 260px; min-width: 240px;
  background: var(--surface); border-right: 1px solid var(--border);
  overflow-y: scroll;
  display: block;
  position: fixed;
  top: calc(44px + env(safe-area-inset-top));
  left: -260px;
  height: calc(100vh - 44px - 44px - env(safe-area-inset-top) - env(safe-area-inset-bottom));
  z-index: 150;
  transition: left .22s;
  box-shadow: 4px 0 20px rgba(0,0,0,.5);
}
aside.open { left: 0; }

/* MAIN — prend toute la largeur */
main { width: 100%; height: calc(100vh - 44px - 44px - env(safe-area-inset-top) - env(safe-area-inset-bottom)); overflow-y: auto; padding: 0; display: flex; flex-direction: column; }
main > *:not(.welcome) { padding: 16px 16px; max-width: 780px; margin: 0 auto; width: 100%; box-sizing: border-box; }
.sidebar-header { padding: 12px 14px 8px; font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--surface); z-index: 10; }
.cat-group { border-bottom: 1px solid var(--border); }
.sidebar-bottom-spacer { height: 200px; }
.cat-label { padding: 10px 14px 4px; font-size: 10px; font-family: var(--mono); color: var(--muted); letter-spacing: 1px; text-transform: uppercase; }
.ann-btn {
  width: 100%; background: none; border: none; border-left: 3px solid transparent;
  padding: 8px 14px; text-align: left; cursor: pointer;
  display: flex; align-items: center; gap: 8px;
  font-family: var(--sans); font-size: 12px; color: var(--muted); transition: all .12s;
}
.ann-btn:hover { background: var(--surface2); color: var(--text); }
.ann-btn.active { background: var(--surface2); color: var(--text); border-left-color: var(--accent); }
.ann-num { font-family: var(--mono); font-size: 10px; color: var(--accent); min-width: 36px; font-weight: 600; }
.ann-name { line-height: 1.3; }

/* WELCOME */
.welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; width: 100%; gap: 14px; color: var(--muted); text-align: center; padding: 20px; box-sizing: border-box; }
.welcome-icon { font-size: 44px; opacity: .25; }
.welcome h2 { font-family: var(--mono); font-size: 16px; color: var(--text); letter-spacing: 2px; }
.welcome p { font-size: 13px; max-width: 300px; line-height: 1.6; }

/* DECISION TREE VIEW */
.proc-header { margin-bottom: 12px; padding-bottom: 10px; border-bottom: 1px solid var(--border); }
.proc-num { font-family: var(--mono); font-size: 11px; color: var(--accent); letter-spacing: 1px; margin-bottom: 3px; }
.proc-title { font-size: 20px; font-weight: 700; margin-bottom: 2px; }
.proc-sys { font-family: var(--mono); font-size: 12px; color: var(--accent2); }

/* BREADCRUMB */
.breadcrumb { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 20px; font-size: 12px; color: var(--muted); font-family: var(--mono); }
.bc-item { cursor: pointer; padding: 3px 8px; border-radius: 4px; border: 1px solid transparent; transition: all .12s; }
.bc-item:hover { color: var(--text); border-color: var(--border); }
.bc-sep { color: var(--border); }
.bc-current { color: var(--accent); }

/* CHOICE CARDS */
.choices-title { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: 1.5px; text-transform: uppercase; margin-bottom: 6px; }
.choices-grid { display: flex; flex-direction: column; gap: 5px; max-width: 680px; }
.choice-card {
  background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
  padding: 14px 18px; cursor: pointer; transition: all .15s;
  display: flex; align-items: center; justify-content: space-between; gap: 12px;
}
.choice-card:hover { border-color: var(--accent); background: rgba(240,180,41,.05); }
.choice-label { font-size: 14px; line-height: 1.4; flex: 1; }
.choice-arrow { color: var(--muted); font-size: 16px; flex-shrink: 0; transition: transform .15s; }
.choice-card:hover .choice-arrow { transform: translateX(4px); color: var(--accent); }
@media (hover: none) {
  .choice-card:hover { border-color: var(--border); background: var(--surface2); }
  .choice-card:hover .choice-arrow { transform: none; color: var(--muted); }
  .choice-card:active { border-color: var(--accent); background: rgba(240,180,41,.05); }
}

/* PROCEDURE RESULT */
.result-box { max-width: 680px; }
.result-tag { display: inline-block; font-family: var(--mono); font-size: 10px; background: rgba(63,185,80,.12); border: 1px solid rgba(63,185,80,.3); border-radius: 4px; padding: 3px 10px; color: var(--success); margin-bottom: 8px; letter-spacing: 1px; }
.steps-list { display: flex; flex-direction: column; gap: 4px; margin-bottom: 12px; }
.step-item {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 11px 14px; border-radius: 6px; cursor: pointer;
  background: var(--surface2); border: 1px solid transparent; transition: all .12s;
}
.step-item:hover { border-color: var(--border); }
.step-item.checked { background: rgba(63,185,80,.07); border-color: rgba(63,185,80,.2); }
.step-item.checked .step-label { color: var(--muted); text-decoration: line-through; }
.step-box {
  width: 18px; height: 18px; border-radius: 4px; border: 2px solid var(--border);
  flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; transition: all .12s;
}
.step-item.checked .step-box { background: var(--success); border-color: var(--success); }
.step-tick { display: none; color: #fff; font-size: 11px; font-weight: 700; }
.step-item.checked .step-tick { display: block; }
.step-label { font-size: 14px; line-height: 1.4; }
.step-item.ref-step .step-box { border-color: var(--accent2); }
.step-item.ref-step .step-label { color: var(--accent2); }
.step-item.ref-step.checked .step-box { background: var(--accent2); border-color: var(--accent2); }

/* GOTO steps — navigate to another annexe */
.step-item.goto-step {
  background: rgba(248,81,73,.06);
  border-color: rgba(248,81,73,.25);
  cursor: pointer;
}
.step-item.goto-step:hover {
  background: rgba(248,81,73,.14);
  border-color: rgba(248,81,73,.55);
}
.step-item.goto-step .step-box { border-color: var(--danger); }
.step-item.goto-step .step-label { color: var(--danger); font-weight: 600; text-decoration: underline; text-underline-offset: 3px; }
.step-item.goto-step .step-arrow { color: var(--danger); font-size: 18px; flex-shrink: 0; margin-left: auto; transition: transform .15s; }
.step-item.goto-step:hover .step-arrow { transform: translateX(4px); }
.step-item.goto-step.checked .step-box { background: var(--danger); border-color: var(--danger); }

.progress-row { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
.prog-label { font-family: var(--mono); font-size: 11px; color: var(--muted); }
.prog-bar { flex: 1; max-width: 200px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }

function loadData() {
  try {
    const saved = localStorage.getItem('genmob_v2_data');
    if (saved) {
      const savedData = JSON.parse(saved);
      const savedVersion = savedData.exportVersion || 0;
      const defaultVersion = DEFAULT_DATA.exportVersion || 0;
      // Garder la version la plus récente
      if (defaultVersion > savedVersion) return JSON.parse(JSON.stringify(DEFAULT_DATA));
      return savedData;
    }
  } catch(e) {}
  return JSON.parse(JSON.stringify(DEFAULT_DATA));
}

function saveData() {
  localStorage.setItem('genmob_v2_data', JSON.stringify(appData));
}

function renderSidebar() {
  const cats = {};
  appData.annexes.filter(a => (a.page || 'POL GE') === currentPage).forEach(a => {
    if (!cats[a.cat]) cats[a.cat] = [];
    cats[a.cat].push(a);
  });
  let html = '<div class="sidebar-header">ANNEXES</div>';
  for (const [cat, list] of Object.entries(cats)) {
    html += `<div class="cat-group"><div class="cat-label">${cat}</div>`;
    list.forEach(ann => {
      const active = currentAnnexeId === ann.id ? ' active' : '';
      html += `<button class="ann-btn${active}" onclick="selectAnnexe('${ann.id}')">
        <span class="ann-num">A${ann.num.replace('Annexe ','').replace('ANNEXE ','')}</span>
        <span class="ann-name">${ann.titre}</span>
      </button>`;
    });
    html += '</div>';
  }
  document.getElementById('sidebar').innerHTML = html + '<div class="sidebar-bottom-spacer"></div>';
}

  currentAnnexeId = id;
  navPath = [];
  annexeHistory = [];
  checked[id] = checked[id] || {};
  renderSidebar();
  renderMain();
  closeMenu();
}

function renderMain() {
  const main = document.getElementById('main');
  if (!currentAnnexeId) {
    main.innerHTML = WELCOME_HTML;
    return;
  }

  const ann = appData.annexes.find(a => a.id === currentAnnexeId);
  if (!ann) return;

  // Resolve current node from navPath
  let node = ann.tree;
  for (const p of navPath) { node = node.children[p]; }

  let html = `
    <div class="proc-header">
      <div class="proc-num">${ann.num}</div>
      <div class="proc-title">${ann.titre}</div>
      <div class="proc-sys">${ann.sys}</div>
    </div>`;

  // Breadcrumb supprimé

  // Clé de base pour les coches (notes + étapes)
  const nodeKey = currentAnnexeId + '_' + navPath.join('_');

  // Notes — cochables sur les CHOIX, affichage simple sur les PROCÉDURES
  const allNotes = node.notes && node.notes.length ? node.notes : (node.note ? [node.note] : []);
  if (allNotes.length) {
    html += `<div class="notes-block">`;
    allNotes.forEach((n, ni) => {
      if (!n) return;
      if (node.type === 'choice') {
        const nk = nodeKey + '_note_' + ni;
        const isChecked = !!checked[nk];
        html += `<div class="note-item ${isChecked?'checked':''}" onclick="toggleNote('${nk}')">
          <div class="note-check-box"><span class="note-check-tick">✓</span></div>
          <div class="note-text">${n}</div>
        </div>`;
      } else {
        html += `<div class="note-item" style="cursor:default;">
          <div class="note-text">${n}</div>
        </div>`;
      }
    });
    html += `</div>`;
  }

  // (navigation uniquement en bas de page)

  if (node.type === 'choice') {
    html += `<div class="choices-title">Choisir la situation applicable :</div>
      <div class="choices-grid">`;
    node.children.forEach((child, idx) => {
      html += `<div class="choice-card" onclick="navigate(${idx})">
        <div class="choice-label">${child.label}</div>
        <div class="choice-arrow">${child.type === 'procedure' ? '✓' : '›'}</div>
      </div>`;
    });
    html += `</div>`;
    // Boutons de navigation en bas des choix
    if (navPath.length > 0 || currentAnnexeId) {
      html += `<div class="action-row">`;
      if (navPath.length > 0) {
        html += `<button class="btn-back" onclick="jumpTo(${navPath.length-2})">← Choix précédent</button>`;
        html += `<button class="btn-back" onclick="jumpTo(-1)">↑ Début de l'annexe</button>`;
      }
      if (annexeHistory.length > 0) {
        const prev = appData.annexes.find(a => a.id === annexeHistory[annexeHistory.length-1].annexeId);
        const prevLabel = prev ? `${prev.num} / ${prev.titre}` : '';
        html += `<button class="btn-back" onclick="goBackAnnexe()">↩ ${prevLabel}</button>`;
      }
      html += `<button class="btn-back home" onclick="goHome()">⌂ Menu principal</button>`;
      html += `</div>`;
    }
  } else if (node.type === 'procedure') {
    const stepsKey = nodeKey;
    const total = (node.steps||[]).length;
    const done = (node.steps||[]).filter((_, i) => checked[stepsKey + '_' + i]).length;
    const pct = total > 0 ? Math.round(done/total*100) : 0;

    html += `<div class="result-box">
      <div class="result-tag">PROCÉDURE À APPLIQUER</div>
      <div class="progress-row">
        <span class="prog-label">Progression</span>
        <div class="prog-bar"><div class="prog-fill ${pct===100?'done':''}" style="width:${pct}%"></div></div>
        <span class="prog-count">${done}/${total}</span>
      </div>
      <div class="complete-badge ${pct===100?'show':''}">✓ PROCÉDURE COMPLÈTE</div>
      <div class="steps-list">`;

    (node.steps||[]).forEach((step, i) => {
      const key = stepsKey + '_' + i;
      const isChecked = !!checked[key];
      if (step.goto) {
        html += `<div class="step-item goto-step ${isChecked?'checked':''}" onclick="gotoAnnexe('${step.goto}','${key}')">
          <div class="step-box"><span class="step-tick">✓</span></div>
          <div class="step-label">${step.t}</div>
          <span class="step-arrow">→</span>
        </div>`;
      } else {
        html += `<div class="step-item ${isChecked?'checked':''} ${step.ref?'ref-step':''}" onclick="toggleStep('${key}')">
          <div class="step-box"><span class="step-tick">✓</span></div>
          <div class="step-label">${step.t}</div>
        </div>`;
      }
      if (step.img) {
        html += `<div style="padding:6px 14px 10px 44px;">
          ${step.imgName ? `<div style="font-size:11px;color:var(--muted);margin-bottom:4px;">${step.imgName}</div>` : ''}
          <img src="${step.img}" alt="${step.imgName||step.t||''}" style="max-width:100%;max-height:360px;border-radius:6px;border:1px solid var(--border);object-fit:contain;cursor:pointer;" onclick="this.requestFullscreen&&this.requestFullscreen()">
        </div>`;
      }
    });

    html += `</div>
      <div class="action-row">
        ${navPath.length > 0 ? `<button class="btn-back" onclick="jumpTo(${navPath.length-2})">← Choix précédent</button>` : ''}
        ${navPath.length > 0 ? `<button class="btn-back" onclick="jumpTo(-1)">↑ Début de l'annexe</button>` : ''}
        ${annexeHistory.length > 0 ? (()=>{ const prev=appData.annexes.find(a=>a.id===annexeHistory[annexeHistory.length-1].annexeId); return `<button class="btn-back" onclick="goBackAnnexe()">↩ ${prev?prev.num+' / '+prev.titre:''}</button>`; })() : ''}
        <button class="btn-back home" onclick="goHome()">⌂ Menu principal</button>
      </div>
    </div>`;
  }

  main.innerHTML = html;
}

function gotoAnnexe(annexeId, checkKey) {
  checked[checkKey] = true;
  saveChecked();
  // Sauvegarder la position actuelle dans l'historique
  annexeHistory.push({ annexeId: currentAnnexeId, navPath: [...navPath] });
  currentAnnexeId = annexeId;
  navPath = [];
  renderSidebar();
  renderMain();
}

function goBackAnnexe() {
  const prev = annexeHistory.pop();
  if (!prev) return;
  currentAnnexeId = prev.annexeId;
  navPath = prev.navPath;
  renderSidebar();
  renderMain();
}

function goHome() {
  annexeHistory = [];
  currentAnnexeId = null;
  navPath = [];
  renderSidebar();
  renderMain();
}

function navigate(idx) {
  navPath.push(idx);
  renderMain();
}

function jumpTo(level) {
  if (level < 0) { navPath = []; }
  else { navPath = navPath.slice(0, level + 1); }
  renderMain();
}

function toggleNote(key) {
  checked[key] = !checked[key];
  saveChecked();
  renderMain();
}

function toggleStep(key) {
  checked[key] = !checked[key];
  saveChecked();
  renderMain();
}

function resetSteps(key, total) {
  // Réinitialiser les étapes
  for (let i = 0; i < total; i++) delete checked[key + '_' + i];
  // Réinitialiser aussi les notes (jusqu'à 20 notes max)
  for (let i = 0; i < 20; i++) delete checked[key + '_note_' + i];
  saveChecked();
  renderMain();
}

function truncate(s, n) { return s.length > n ? s.slice(0, n) + '…' : s; }

// ================================================================
// SEARCH
// ================================================================
function doSearch(q) {
  const main = document.getElementById('main');
  q = q.trim();
  if (!q) {
    if (currentAnnexeId) { renderMain(); }
    else { main.innerHTML = WELCOME_HTML; }
    return;
  }

  const ql = q.toLowerCase();
  const results = [];

  function searchNode(ann, node, path) {
    const lbl = node.label.toLowerCase();
    if (lbl.includes(ql)) results.push({ann, node, path: [...path]});
    if (node.type === 'choice') node.children.forEach((c,i) => searchNode(ann, c, [...path, i]));
    if (node.type === 'procedure' && node.steps) {
      node.steps.forEach(s => { if (s.t.toLowerCase().includes(ql)) results.push({ann, node, path:[...path], step:s.t}); });
    }
  }

  appData.annexes.forEach(ann => searchNode(ann, ann.tree, []));

  const hi = t => t.replace(new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi'), m => `<mark>${m}</mark>`);

  let html = `<div class="search-section"><div class="search-title">${results.length} résultat(s) pour « ${q} »</div>`;
  if (!results.length) { html += `<p style="color:var(--muted);font-size:13px;">Aucun résultat.</p>`; }
  results.slice(0,40).forEach(r => {
    html += `<div class="sr-item" onclick="goSearch('${r.ann.id}','${r.path.join(',')}')">
      <div class="sr-ann">${r.ann.num} — ${r.ann.sys}</div>
      <div class="sr-label">${hi(r.step || r.node.label)}</div>
    </div>`;
  });
  html += '</div>';
  main.innerHTML = html;
}

function goSearch(annId, pathStr) {
  currentAnnexeId = annId;
  navPath = pathStr ? pathStr.split(',').map(Number) : [];
  document.getElementById('searchInput').value = '';
  renderSidebar();
  renderMain();
}

// ================================================================
// APP LOGIN — code PIN 6 chiffres
// ================================================================
const DEFAULT_APP_PIN = '123456';
const DEFAULT_PWD_HASH = '654321';
let pinBuffer = '';

function getAppPin()  { return appData.appPin  || DEFAULT_APP_PIN; }
function getPwdHash() { return appData.editorPin || DEFAULT_PWD_HASH; }

function saveAppPin(pin) {
  appData.appPin = pin;
  saveData();
}
function saveEditorPin(hash) {
  appData.editorPin = hash;
  saveData();
}

function pinPress(d) {
  if (pinBuffer.length >= 6) return;
  pinBuffer += d;
  updatePinDots();
  if (pinBuffer.length === 6) setTimeout(checkPin, 120);
}

function pinDel() {
  pinBuffer = pinBuffer.slice(0, -1);
  updatePinDots();
  document.getElementById('pinError').textContent = '';
}

function updatePinDots() {
  for (let i = 0; i < 6; i++) {
    const dot = document.getElementById('pd' + i);
    dot.classList.toggle('filled', i < pinBuffer.length);
    dot.classList.remove('error');
  }
}

function checkPin() {
  if (pinBuffer === getAppPin()) {
    document.getElementById('appLogin').style.display = 'none';
  } else {
    // Erreur — flasher en rouge
    for (let i = 0; i < 6; i++) {
      const dot = document.getElementById('pd' + i);
      dot.classList.remove('filled');
      dot.classList.add('error');
    }
    document.getElementById('pinError').textContent = 'Code incorrect';
    setTimeout(() => {
      pinBuffer = '';
      updatePinDots();
      document.getElementById('pinError').textContent = '';
    }, 900);
  }
}


function hashPwd(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) { h = (Math.imul(31, h) + s.charCodeAt(i)) | 0; }
  return 'h_' + Math.abs(h).toString(36) + '_' + s.length;
}

// ── Digicode éditeur ──
let edPinBuffer = '';


function getCurrentFileName() {
  const version = appData.exportVersion || 0;
  const dateShort = appData.exportDate || (() => {
    const now = new Date();
    return String(now.getFullYear()).slice(2) + String(now.getMonth()+1).padStart(2,'0') + String(now.getDate()).padStart(2,'0');
  })();
  if (version === 0) return 'Version : non exporté';
  return 'Version : GENMOB_' + dateShort + '-V' + String(version).padStart(2,'0');
}

function updateEdFileName() {
  const el = document.getElementById('edFileName');
  if (el) el.textContent = getCurrentFileName();
}
function openEditor() {
  edPinBuffer = '';
  updateEdPinDots();
  document.getElementById('edPinError').textContent = '';
  updateEdFileName();
  document.getElementById('pwdOverlay').classList.add('show');
}

function closePwdModal() {
  document.getElementById('pwdOverlay').classList.remove('show');
  edPinBuffer = '';
  updateEdPinDots();
}

function edPinPress(d) {
  if (edPinBuffer.length >= 6) return;
  edPinBuffer += d;
  updateEdPinDots();
  if (edPinBuffer.length === 6) setTimeout(checkEdPin, 120);
}

function edPinDel() {
  edPinBuffer = edPinBuffer.slice(0, -1);
  updateEdPinDots();
  document.getElementById('edPinError').textContent = '';
}

function updateEdPinDots() {
  for (let i = 0; i < 6; i++) {
    const dot = document.getElementById('epd' + i);
    dot.classList.toggle('filled', i < edPinBuffer.length);
    dot.classList.remove('error');
  }
}

function checkEdPin() {
  const val = edPinBuffer;
  const stored = getPwdHash();
  const match = (stored === DEFAULT_PWD_HASH && val === DEFAULT_PWD_HASH) ||
                (stored.startsWith('h_') && hashPwd(val) === stored) ||
                val === stored;
  if (match) {
    document.getElementById('pwdOverlay').classList.remove('show');
    editorAnnexeId = currentAnnexeId || appData.annexes[0]?.id;
    renderEditor();
    document.getElementById('editorOverlay').classList.add('show');
    edPinBuffer = '';
    updateEdPinDots();
  } else {
    for (let i = 0; i < 6; i++) {
      const dot = document.getElementById('epd' + i);
      dot.classList.remove('filled');
      dot.classList.add('error');
    }
    document.getElementById('edPinError').textContent = 'Code incorrect';
    setTimeout(() => {
      edPinBuffer = '';
      updateEdPinDots();
      document.getElementById('edPinError').textContent = '';
    }, 900);
  }
}

function closeEditor() { document.getElementById('editorOverlay').classList.remove('show'); }


function renderEditor() {
  const body = document.getElementById('editorBody');

  });

  let html = navHtml;
  html += `<div class="ed-section">
    <div class="ed-section-title">Informations générales</div>
    <div class="ed-field"><label>Numéro</label><input id="ed_num" value="${esc(ann.num)}"></div>
    <div class="ed-field"><label>Titre</label><input id="ed_titre" value="${esc(ann.titre)}"></div>
    <div class="ed-field"><label>Système (ex: RIPOL, LEI, LCR…)</label><input id="ed_sys" value="${esc(ann.sys)}"></div>
    <div class="ed-field"><label>Catégorie (groupe dans le menu)</label><input id="ed_cat" value="${esc(ann.cat)}"></div>
    <div class="ed-field"><label>Page</label>
      <select id="ed_page" style="width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:var(--sans);font-size:13px;padding:8px 10px;outline:none;">
        <option value="POL GE" ${(ann.page||'POL GE')==='POL GE'?'selected':''}>POL GE</option>
        <option value="POL VD" ${ann.page==='POL VD'?'selected':''}>POL VD</option>
        <option value="DOGA"   ${ann.page==='DOGA'?'selected':''}>DOGA</option>
      </select>
    </div>
  </div>
  <div class="ed-section">
    <div class="ed-section-title">Arbre de décision</div>
    ${renderNodeEditor(ann.tree, [])}
  </div>`;

  body.innerHTML = html;

function renderNodeEditor(node, path) {
  const pathStr = path.join(',');
  const isProc = node.type === 'procedure';
  let html = `<div class="node-editor" data-path="${pathStr}">
    <div class="node-editor-header">
      <span class="node-type-badge ${isProc ? 'type-procedure' : 'type-choice'}">${isProc ? 'ÉTAPES' : 'CHOIX'}</span>
      <input class="node-label-input" value="${esc(node.label)}" onchange="updateNodeLabel('${pathStr}', this.value)" placeholder="Libellé du nœud">
      <button class="btn-icon" onclick="toggleNodeType('${pathStr}')" title="Changer type">⇄</button>
      ${path.length > 0 ? `<button class="btn-icon" onclick="deleteNode('${pathStr}')" title="Supprimer">🗑</button>` : ''}
    </div>`;

  // ── NOTES MULTIPLES ──
  const notes = node.notes || (node.note !== undefined ? [node.note] : null);
  if (notes) {
    html += `<div style="margin-bottom:8px;">
      <div style="font-size:10px;color:var(--muted);font-family:var(--mono);letter-spacing:1px;margin-bottom:6px;">NOTES (affichées en orange)</div>`;
    notes.forEach((n, ni) => {
      html += `<div class="note-edit-row">
        <textarea onchange="updateNote('${pathStr}',${ni},this.value)" placeholder="Note…">${esc(n||'')}</textarea>
        <button class="btn-icon" onclick="deleteNote('${pathStr}',${ni})" title="Supprimer">✕</button>
      </div>`;
    });
    html += `<button class="add-btn" style="margin-top:0;" onclick="addNote('${pathStr}')">+ Ajouter une note</button>
    </div>`;
  } else {
    html += `<button class="add-btn" style="margin-bottom:8px;" onclick="addNote('${pathStr}')">+ Ajouter une note</button>`;
  }

  if (isProc) {
    const containerId = 'steps_' + (pathStr === '' ? 'root' : pathStr.replace(/,/g,'_'));
    html += `<div class="steps-editor" id="${containerId}">`;    (node.steps || []).forEach((s, si) => {
      const stepType = s.goto !== undefined ? 'goto' : s.ref ? 'ref' : 'normal';
      const safePs = pathStr.replace(/,/g,'|'); // encode virgules pour data-attr
      const inpStyle = `background:var(--bg);border:1px solid var(--border);border-radius:5px;color:var(--text);font-family:var(--sans);font-size:13px;padding:7px 10px;outline:none;width:100%;`;
      html += `<div style="background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:8px 10px;margin-bottom:4px;">
        <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
          <select class="step-type-sel" data-ps="${safePs}" data-si="${si}" onchange="edChangeType(this)">
            <option value="normal" ${stepType==='normal'?'selected':''}>✏️ Normal</option>
            <option value="ref"    ${stepType==='ref'?'selected':''}>🔵 Référence</option>
            <option value="goto"   ${stepType==='goto'?'selected':''}>🔴 Lien annexe</option>
          </select>`;

      if (stepType === 'goto') {
        const annexeOptions = appData.annexes.map(a =>
          `<option value="${a.id}" ${s.goto===a.id?'selected':''}>${a.num} — ${a.titre}</option>`
        ).join('');
        html += `<input style="flex:1;min-width:120px;${inpStyle}" value="${esc(s.t)}" data-ps="${safePs}" data-si="${si}" onchange="edUpdateStep(this)" placeholder="Texte affiché…">
          <select class="step-goto-sel" data-ps="${safePs}" data-si="${si}" onchange="edUpdateGoto(this)">
            <option value="">— Choisir l'annexe cible —</option>
            ${annexeOptions}
          </select>`;
      } else {
        html += `<input style="flex:1;${inpStyle}" value="${esc(s.t)}" data-ps="${safePs}" data-si="${si}" onchange="edUpdateStep(this)" placeholder="Texte de l'étape…">`;
      }

      html += `<button class="btn-icon" data-ps="${safePs}" data-si="${si}" onclick="edDeleteStep(this)" title="Supprimer">✕</button>
        </div>
        <div style="display:flex;gap:6px;margin-top:6px;align-items:center;">
          <span style="font-size:10px;color:var(--muted);font-family:var(--mono);white-space:nowrap;">🖼 Image :</span>
          <input style="flex:1;${inpStyle}font-size:11px;padding:5px 8px;" value="${esc(s.imgName||'')}" data-ps="${safePs}" data-si="${si}" onchange="edUpdateImgName(this)" placeholder="Nom / légende (optionnel)">
          <input style="flex:2;${inpStyle}font-size:11px;padding:5px 8px;" value="${esc(s.img||'')}" data-ps="${safePs}" data-si="${si}" onchange="edUpdateImg(this)" placeholder="URL de l'image (laisser vide si aucune)">
        </div>
      </div>`;
    });
    html += `</div>
    <button class="add-btn" data-ps="${pathStr.replace(/,/g,'|')}" onclick="edAddStep(this)">+ Ajouter une étape</button>`;
  } else {
    if (node.children && node.children.length) {
      html += `<div class="children-list">`;
      node.children.forEach((child, ci) => {
        html += renderNodeEditor(child, [...path, ci]);
      });
      html += `</div>`;
    }
    html += `<button class="add-btn" onclick="addChild('${pathStr}', 'choice')">+ Ajouter un sous-choix</button>
             <button class="add-btn" onclick="addChild('${pathStr}', 'procedure')">+ Ajouter une procédure finale</button>`;
  }

  html += `</div>`;
  return html;
}

function getNode(pathStr) {
  const ann = appData.annexes.find(a => a.id === editorAnnexeId);
  if (!ann) return null;
  if (pathStr === '' || pathStr === undefined || pathStr === null) return ann.tree;
  const path = pathStr.split(',').map(Number).filter(n => !isNaN(n));
  if (path.length === 0) return ann.tree;
  let node = ann.tree;
  for (const idx of path) {
    if (!node || !node.children) return null;
    node = node.children[idx];
  }
  return node || null;
}

function updateNodeLabel(pathStr, val) { const n = getNode(pathStr); if(n) n.label = val; }

// ── Notes multiples ──
function addNote(pathStr) {
  const n = getNode(pathStr);
  if (!n) return;
  if (n.note !== undefined && !n.notes) { n.notes = [n.note, '']; delete n.note; }
  else if (n.notes) { n.notes.push(''); }
  else { n.notes = ['']; }
  renderEditor();
}
function updateNote(pathStr, ni, val) {
  const n = getNode(pathStr);
  if (!n) return;
  if (n.notes) n.notes[ni] = val;
  else if (n.note !== undefined) n.note = val;
}
function deleteNote(pathStr, ni) {
  const n = getNode(pathStr);
  if (!n || !n.notes) return;
  n.notes.splice(ni, 1);
  if (n.notes.length === 0) delete n.notes;
  renderEditor();
}

// ── Steps (data-attribute handlers — évite le bug des virgules dans pathStr) ──
function decPs(el) { return el.dataset.ps.replace(/\|/g,','); }
function decSi(el) { return parseInt(el.dataset.si); }

function edChangeType(el)    { changeStepType(decPs(el), decSi(el), el.value); }
function edUpdateStep(el)    { updateStep(decPs(el), decSi(el), el.value); }
function edUpdateGoto(el)    { updateStepGoto(decPs(el), decSi(el), el.value); }
function edDeleteStep(el)    { deleteStep(decPs(el), decSi(el)); }
function edUpdateImg(el)     { updateStepImg(decPs(el), decSi(el), el.value); }
function edUpdateImgName(el) { updateStepImgName(decPs(el), decSi(el), el.value); }
function edAddStep(el)       { addStep(el.dataset.ps.replace(/\|/g,',')); }

function updateStep(pathStr, si, val) { const n = getNode(pathStr); if(n && n.steps) n.steps[si].t = val; }
function updateStepRef(pathStr, si, val) { const n = getNode(pathStr); if(n && n.steps) n.steps[si].ref = val; }
function updateStepGoto(pathStr, si, val) { const n = getNode(pathStr); if(n && n.steps) { n.steps[si].goto = val; renderEditor(); } }
function updateStepImg(pathStr, si, val) { const n = getNode(pathStr); if(n && n.steps) { if(val) n.steps[si].img = val; else delete n.steps[si].img; } }
function updateStepImgName(pathStr, si, val) { const n = getNode(pathStr); if(n && n.steps) { if(val) n.steps[si].imgName = val; else delete n.steps[si].imgName; } }

function changeStepType(pathStr, si, newType) {
  const n = getNode(pathStr);
  if (!n || !n.steps) return;
  const s = n.steps[si];
  if (!s) return;
  delete s.ref; delete s.goto;
  if (newType === 'ref')  s.ref = true;
  if (newType === 'goto') s.goto = '';
  setTimeout(() => renderEditor(), 0);
}

function addStep(pathStr) {
  const n = getNode(pathStr);
  if (!n) return;
  if (!n.steps) n.steps = [];
  n.steps.push({t:'Nouvelle étape'});
  renderEditor();
}

function deleteStep(pathStr, si) {
  const n = getNode(pathStr);
  if (n && n.steps) { n.steps.splice(si, 1); renderEditor(); }
}

function deleteNode(pathStr) {
  if (!confirm('Supprimer ce nœud et tout son contenu ?')) return;
  const path = pathStr.split(',').map(Number);
  const lastIdx = path.pop();
  const parent = getNode(path.length ? path.join(',') : '');
  if (parent && parent.children) {
    parent.children.splice(lastIdx, 1);
    renderEditor();
  }
}

function addChild(pathStr, type) {
  const n = getNode(pathStr);
  if (!n) return;
  if (!n.children) n.children = [];
  if (type === 'choice') n.children.push({type:'choice', label:'Nouveau choix', children:[]});
  else n.children.push({type:'procedure', label:'Nouvelle procédure', steps:[{t:'Étape 1'}]});
  renderEditor();
}

function toggleNodeType(pathStr) {
  const n = getNode(pathStr);
  if (!n) return;
  if (n.type === 'choice') {
    n.type = 'procedure';
    n.steps = n.steps || [];
    delete n.children;
  } else {
    n.type = 'choice';
    n.children = n.children || [];
    delete n.steps;
  }
  renderEditor();
}

function handleImport(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const content = e.target.result;

      // Trouver le début de DEFAULT_DATA
      const marker = 'const DEFAULT_DATA = ';
      const start = content.indexOf(marker);
      if (start === -1) {
        alert('❌ Fichier invalide — aucune donnée GENMOB trouvée.');
        return;
      }

      // Extraire le JSON en comptant les accolades
      let jsonStart = start + marker.length;
      let depth = 0;
      let jsonEnd = jsonStart;
      for (let i = jsonStart; i < content.length; i++) {
        const c = content[i];
        if (c === '{') depth++;
        else if (c === '}') { depth--; if (depth === 0) { jsonEnd = i + 1; break; } }
      }

      const jsonStr = content.slice(jsonStart, jsonEnd);
      const imported = JSON.parse(jsonStr);

      if (!imported.annexes || !Array.isArray(imported.annexes)) {
        alert('❌ Format de données invalide.');
        return;
      }
      if (!confirm(`Importer ${imported.annexes.length} annexe(s) depuis "${file.name}" ?\n\nCela remplacera toutes les données actuelles.`)) return;

      appData = imported;
      saveData();
      editorAnnexeId = appData.annexes[0]?.id;
      renderEditor();
      renderSidebar();
      renderMain();

      const ind = document.getElementById('edSaveIndicator');
      if (ind) { ind.textContent = '✓ Importé !'; ind.style.opacity = '1'; setTimeout(() => { ind.style.opacity = '0'; ind.textContent = '✓ Enregistré'; }, 2500); }
    } catch(err) {
      alert('❌ Erreur lors de l\'import : ' + err.message);
    }
  };
  reader.readAsText(file);
}
function exportFile() {
  const sidebar   = document.getElementById('sidebar');
  const mainEl    = document.getElementById('main');
  const edBody    = document.getElementById('editorBody');
  const edOverlay = document.getElementById('editorOverlay');
  const pwdOv     = document.getElementById('pwdOverlay');
  const changePwd = document.getElementById('changePwdPanel');
  const overlay   = document.getElementById('overlay');
  const appLogin  = document.getElementById('appLogin');

  const savedSidebar   = sidebar.innerHTML;
  const savedMain      = mainEl.innerHTML;
  const savedEdBody    = edBody ? edBody.innerHTML : '';
  const edHadShow      = edOverlay ? edOverlay.classList.contains('show') : false;
  const pwdHadShow     = pwdOv ? pwdOv.classList.contains('show') : false;
  const overlayHadVis  = overlay ? overlay.classList.contains('vis') : false;
  const changePwdShown = changePwd ? changePwd.style.display : 'none';

  // Réinitialiser pour l'export
  sidebar.innerHTML   = '';
  mainEl.innerHTML    = '';
  if (edBody)    edBody.innerHTML = '';
  if (edOverlay) edOverlay.classList.remove('show');
  if (pwdOv)     pwdOv.classList.remove('show');
  if (overlay)   overlay.classList.remove('vis');
  if (changePwd) changePwd.style.display = 'none';
  // L'écran login doit être visible à l'ouverture du fichier exporté
  if (appLogin)  appLogin.style.display = 'flex';

  // Capturer le HTML propre
  const source = document.documentElement.outerHTML;

  // Restaurer immédiatement
  sidebar.innerHTML   = savedSidebar;
  mainEl.innerHTML    = savedMain;
  if (edBody)    edBody.innerHTML = savedEdBody;
  if (edOverlay && edHadShow)     edOverlay.classList.add('show');
  if (pwdOv     && pwdHadShow)    pwdOv.classList.add('show');
  if (overlay   && overlayHadVis) overlay.classList.add('vis');
  if (changePwd) changePwd.style.display = changePwdShown;
  // Restaurer l'état login (caché car on est déjà connecté)
  if (appLogin)  appLogin.style.display = 'none';

  // Injecter les données actuelles
  const marker = 'const DEFAULT_DATA = ';
  const start = source.indexOf(marker);
  if (start === -1) { alert('❌ Impossible de localiser les données dans le fichier.'); return; }

  let depth = 0, jsonEnd = start + marker.length;
  for (let i = jsonEnd; i < source.length; i++) {
    const c = source[i];
    if (c === '{') depth++;
    else if (c === '}') { depth--; if (depth === 0) { jsonEnd = i + 1; break; } }
  }

  const exported = source.slice(0, start + marker.length) + JSON.stringify(appData) + source.slice(jsonEnd);

  const blob = new Blob([exported], { type: 'text/html;charset=utf-8' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  const now = new Date();
  const dateShort = String(now.getFullYear()).slice(2) + String(now.getMonth()+1).padStart(2,'0') + String(now.getDate()).padStart(2,'0');
  const version = (appData.exportVersion || 0) + 1;
  appData.exportVersion = version;
  appData.exportDate = dateShort;
  saveData();
  const versionStr = 'V' + String(version).padStart(2, '0');
  a.download = 'GENMOB_' + dateShort + '-' + versionStr + '.html';
  a.click();
  URL.revokeObjectURL(url);
  updateEdFileName();
}

// Bloquer double-tap zoom sauf sur éléments interactifs
let lastTap = 0;
document.addEventListener('touchend', function(e) {
  const tag = e.target.tagName;
  const interactive = tag === 'BUTTON' || tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT' || tag === 'A';
  if (interactive) return;
  const now = Date.now();
  if (now - lastTap < 300) e.preventDefault();
  lastTap = now;
}, { passive: false });

// ── SERVICE WORKER — mise à jour automatique ──
if ('serviceWorker' in navigator) {
  const swCode = `
const CACHE = 'genmob-v1';
self.addEventListener('install', e => {
  self.skipWaiting();
});
self.addEventListener('activate', e => {
  e.waitUntil(
    caches.keys().then(keys =>
      Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))
    )
  );
  self.clients.claim();
});
self.addEventListener('fetch', e => {
  e.respondWith(
    fetch(e.request).then(r => {
      const clone = r.clone();
      caches.open(CACHE).then(c => c.put(e.request, clone));
      return r;
    }).catch(() => caches.match(e.request))
  );
});
`;
  const blob = new Blob([swCode], {type: 'application/javascript'});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).then(reg => {
    reg.addEventListener('updatefound', () => {
      const nw = reg.installing;
      nw.addEventListener('statechange', () => {
        if (nw.state === 'installed' && navigator.serviceWorker.controller) {
          // Nouvelle version disponible — recharger silencieusement
          window.location.reload();
        }
      });
    });
  }).catch(() => {});
}
